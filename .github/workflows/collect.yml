name: Collect Results

on:
  # 土日の18:00 JST (= 9:00 UTC) に自動実行
  schedule:
    - cron: '0 9 * * 6'  # 土曜 18:00 JST
    - cron: '0 9 * * 0'  # 日曜 18:00 JST
  # 手動実行
  workflow_dispatch:
    inputs:
      date:
        description: '対象日 (YYYY-MM-DD, 空=今日)'
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect results
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          DATE="${INPUT_DATE}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          fi
          # 入力値バリデーション
          if ! [[ "$DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] && ! [[ "$DATE" =~ ^[0-9]{8}$ ]]; then
            echo "Invalid date format: $DATE"
            exit 1
          fi
          echo "Collecting results for: $DATE"
          python3 scripts/run_collect.py --date "$DATE"

      - name: Commit results
        run: |
          git config user.name "keiba-bot"
          git config user.email "keiba-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            git commit -m "results: $DATE auto-collected"
            git push origin main
          fi
