name: Collect Results

on:
  # 土日の18:00 JST (= 9:00 UTC) に自動実行
  schedule:
    - cron: '0 9 * * 6'  # 土曜 18:00 JST
    - cron: '0 9 * * 0'  # 日曜 18:00 JST
  # 手動実行
  workflow_dispatch:
    inputs:
      date:
        description: '対象日 (YYYY-MM-DD, 空=今日)'
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          # 最新のpredictionデータを取得するためpull
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect results
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          fi
          echo "Collecting results for: $DATE"
          python3 scripts/run_collect.py --date "$DATE"

      - name: Commit results
        run: |
          git config user.name "keiba-bot"
          git config user.email "keiba-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            git commit -m "results: $DATE auto-collected"
            git push
          fi
