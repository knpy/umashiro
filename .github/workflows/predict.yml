name: Weekend Prediction

on:
  # 土日の朝9:00 JST (= 0:00 UTC) に自動実行
  schedule:
    - cron: '0 0 * * 6'  # 土曜 09:00 JST
    - cron: '0 0 * * 0'  # 日曜 09:00 JST
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      date:
        description: '対象日 (YYYYMMDD, 空=今日)'
        required: false
      venue:
        description: '会場フィルタ (空=全会場)'
        required: false
      official_only:
        description: '正モデルのみ実行'
        type: boolean
        default: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_VENUE: ${{ github.event.inputs.venue }}
          INPUT_OFFICIAL: ${{ github.event.inputs.official_only }}
        run: |
          # デフォルト: 今日の日付 (JST)
          DATE="${INPUT_DATE}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Tokyo date +%Y%m%d)
          fi

          # 入力値バリデーション
          if ! [[ "$DATE" =~ ^[0-9]{8}$ ]]; then
            echo "Invalid date format: $DATE"
            exit 1
          fi

          ARGS=("--date" "$DATE" "--delay" "1.5")
          if [ -n "$INPUT_VENUE" ]; then
            if ! [[ "$INPUT_VENUE" =~ ^[a-zA-Zぁ-んァ-ヶ亜-熙]+$ ]]; then
              echo "Invalid venue: $INPUT_VENUE"
              exit 1
            fi
            ARGS+=("--venue" "$INPUT_VENUE")
          fi
          if [ "$INPUT_OFFICIAL" = "true" ]; then
            ARGS+=("--official-only")
          fi

          echo "Running: python3 scripts/run_predict.py ${ARGS[*]}"
          python3 scripts/run_predict.py "${ARGS[@]}"

      - name: Commit predictions
        run: |
          git config user.name "keiba-bot"
          git config user.email "keiba-bot@users.noreply.github.com"
          git add data/ reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            git commit -m "predictions: $DATE auto-generated"
            git push origin main
          fi
